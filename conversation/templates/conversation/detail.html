{% extends 'core/base.html' %}

{% block title %}
    Conversation
{% endblock %}

{% block content %}
    <h1 class="mb-6 text-3xl">Conversation</h1>

    <div class="space-y-6">
        {% for message in conversations. messages.all%}
    
            <div class="p-6 flex {% if message.created_by == request.user%}bg-gray-100 {%else%}bg-gray-100{%endif%}rounded-xl">
                <div>
                    <p class="mb-4"><strong>{{message.created_by.username}}</strong> | {{message.created_at}}</p>
                    <p>{{message.content}}</p>
                </div>           
                   
            </div>
            
        {%endfor%}
    </div>

    <form action="." method="post">
        {%csrf_token%}
        {%form.as_p%}

        <button type="submit" class="mt-4 px-6 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-700">
        Sund
      </button>
    </form>
{% endblock %}
