{%extends 'core/base.html'%}

<!-- wxwj -->
{%block title%} {{title}}
<!-- al -->
{%endblock%}

<!-- wdwk -->
{%block content%}
<!-- wdwld -->
 <h1 class="mb-6 text-3xl">{{title}}</h1>

 <form action="." method="post" enctype="multipart/form-data">
    {%csrf_token%}

    <div class="space-y-4">{{form.as_p}}</div>
    {%if form.errors or form.non_field_errors%}
        <div class="mb-3 p-6 bg-red-100 rounded-xl">
            {%for feild in form%}
                {{feild.errors}}
            {%endfor%}
            {{ form.non_field_errors }}
        </div>
    {%endif%} 

    <button type="submit" class="mt-6 px-8 py-4 bg-blue-500 text-white rounded-xl hover:bg-blue-700">
        Submit
    </button>
 </form>
{%endblock%}
