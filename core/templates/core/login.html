{% extends 'core/base.html' %}

<!-- start -->
{% block title %}
  Login 
{% endblock %}
<!-- content -->
{% block content %}
  <div class="w-1/2 my-6 p-6 mx-auto bg-gray-100 rounded-xl p-6">
    <h1 class="mb-6 text-3xl text-center">Login</h1>

    <form method="post" action=".">
      {% csrf_token %}
    
      <div class="mb-3">
        <label class="inline-block mb-2">Username</label><br>
        {{form.username}}
      </div>
      <div class="mb-3">
        <label class="inline-block mb-2">Password</label><br>
        {{form.password}}
      </div>
      {%if form.errors or form.non_field_errors%}
        <div class="mb-3 p-6 bg-red-100 rounded-xl">
            {%for feild in form%}
                {{feild.errors}}
            {%endfor%}
            {{ form.non_field_errors }}
        </div>
      {%endif%}
      <button type="submit" class="mt-4 px-6 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-700">
        Login 
      </button>
    </form>
  </div>
  <!-- end -->
{% endblock %}
